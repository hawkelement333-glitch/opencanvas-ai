name: opencanvas-ai

x-api-environment: &api-environment
  APP_MODE: development
  OPENCANVAS_APP_URL: http://localhost:3000
  OPENCANVAS_DATABASE_URL: postgresql+asyncpg://opencanvas:opencanvas@db:5432/opencanvas
  OPENCANVAS_AI_PROVIDER: mock
  OPENCANVAS_EMBEDDING_PROVIDER: mock
  OPENCANVAS_STORAGE_PROVIDER: local
  OPENCANVAS_DOCUMENT_STORAGE_ROOT: /app/data/documents
  OPENCANVAS_JOB_PROVIDER: database
  OPENCANVAS_SESSION_SECRET: development-only-session-secret-change-before-deploying

services:
  postgres-test:
    profiles: ["test"]
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: opencanvas_test_admin
      POSTGRES_USER: opencanvas_test
      POSTGRES_PASSWORD: local-test-only
    ports:
      - "55432:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U opencanvas_test -d opencanvas_test_admin"]
      interval: 2s
      timeout: 5s
      retries: 20

  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: opencanvas
      POSTGRES_USER: opencanvas
      POSTGRES_PASSWORD: opencanvas
    ports:
      - "5432:5432"
    volumes:
      - opencanvas-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opencanvas -d opencanvas"]
      interval: 5s
      timeout: 5s
      retries: 10

  api-migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: ${OPENCANVAS_ENV_FILE:-.env.example}
    environment:
      <<: *api-environment
    command: ["alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: ${OPENCANVAS_ENV_FILE:-.env.example}
    environment:
      <<: *api-environment
    ports:
      - "8000:8000"
    volumes:
      - opencanvas-files:/app/data/documents
    depends_on:
      api-migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/ready')",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: ${OPENCANVAS_ENV_FILE:-.env.example}
    environment:
      <<: *api-environment
    command: ["python", "-m", "scripts.worker"]
    volumes:
      - opencanvas-files:/app/data/documents
    depends_on:
      api-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-m", "scripts.worker", "--healthcheck"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}"
    environment:
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}"
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
      worker:
        condition: service_healthy

volumes:
  opencanvas-db:
  opencanvas-files:
