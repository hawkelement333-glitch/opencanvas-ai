name: Format submission branch

on:
  push:
    branches:
      - agent/rebrand-solarplexus-mobius

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/rebrand-solarplexus-mobius

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format submission Markdown
        run: |
          pnpm --filter @opencanvas/web exec prettier --write \
            ../../README.md \
            ../../BUILD_WEEK_CHECKLIST.md \
            ../../CODE_OF_CONDUCT.md \
            ../../CONTRIBUTING.md \
            ../../SECURITY.md \
            ../../docs/BUILD_WEEK.md \
            ../../docs/DEMO_GUIDE.md \
            ../../docs/JUDGE_SETUP.md \
            ../../docs/RELEASE_METADATA.md \
            ../../docs/RELEASE_NOTES_v0.3.0-buildweek-demo.md

      - name: Commit formatting changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No formatting changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md BUILD_WEEK_CHECKLIST.md CODE_OF_CONDUCT.md CONTRIBUTING.md SECURITY.md docs/BUILD_WEEK.md docs/DEMO_GUIDE.md docs/JUDGE_SETUP.md docs/RELEASE_METADATA.md docs/RELEASE_NOTES_v0.3.0-buildweek-demo.md
          git commit -m "Format Build Week submission documentation"
          git push origin HEAD:agent/rebrand-solarplexus-mobius
