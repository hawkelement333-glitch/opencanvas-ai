name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Canonical validation
    runs-on: ubuntu-latest
    timeout-minutes: 35

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: opencanvas_ci
          POSTGRES_USER: opencanvas
          POSTGRES_PASSWORD: opencanvas-ci-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opencanvas -d opencanvas_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      CI: "true"
      OPENCANVAS_ENVIRONMENT: test
      OPENCANVAS_DATABASE_URL: postgresql+asyncpg://opencanvas:opencanvas-ci-only@127.0.0.1:5432/opencanvas_ci
      OPENCANVAS_CORS_ORIGINS: '["http://127.0.0.1:3000","http://localhost:3000"]'
      OPENCANVAS_AI_PROVIDER: mock
      OPENCANVAS_EMBEDDING_PROVIDER: mock
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8000/api/v1

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install JavaScript dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Install API and test dependencies
        run: python -m pip install -e "apps/api[dev]"

      - name: Install Playwright browser
        run: corepack pnpm --filter @opencanvas/web exec playwright install --with-deps chromium

      - name: Prepare temporary storage
        run: |
          echo "OPENCANVAS_DOCUMENT_STORAGE_ROOT=$RUNNER_TEMP/opencanvas-documents" >> "$GITHUB_ENV"
          mkdir -p "$RUNNER_TEMP/opencanvas-documents"

      - name: Run canonical validation
        run: corepack pnpm validate
